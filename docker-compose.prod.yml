services:
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN required}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/nginx/nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - ./deploy/nginx/nginx-init.conf.template:/etc/nginx/templates/nginx-init.conf.template:ro
      - ./deploy/nginx/docker-entrypoint.sh:/docker-entrypoint.sh:ro
      - ./logs/nginx:/var/log/nginx
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    entrypoint: ["/bin/sh", "/docker-entrypoint.sh"]
    depends_on:
      - frontend
      - backend
    networks:
      - public

  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done;"
    depends_on:
      - nginx
    networks:
      - public

volumes:
  certbot_conf:
  certbot_www:
